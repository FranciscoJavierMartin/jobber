version: '3.9'
services:
  redis:
    container_name: redis_container
    image: redis:alpine
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --loglevel warning
    volumes:
      - ./docker-volumes/cache:/data
  mongodb:
    container_name: mongodb_container
    image: mongo:7.0.4
    restart: always
    ports:
      - 27017:27017
    volumes:
      - ./docker-volumes/data:/data/db
  mysql:
    container_name: mysql_container
    image: mysql:8.2.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      - MYSQL_DATABASE=jobber_auth # Just for development
      - MYSQL_USER=jobber # Just for development
      - MYSQL_ROOT_PASSWORD=api # Just for development
      - MYSQL_PASSWORD=api # Just for development
    ports:
      - '3306:3306'
    volumes:
      - ./docker-volumes/mysql:/var/lib/mysql
  postgres:
    container_name: postgres_container
    image: postgres:16.1
    restart: always
    environment:
      - POSTGRES_DB=jobber_reviews # Just for development
      - POSTGRES_USER=jobber # Just for development
      - POSTGRES_PASSWORD=api # Just for development
    ports:
      - '5432:5432'
    volumes:
      - ./docker-volumes/postgres:/var/lib/postgres
  rabbitmq:
    container_name: rabbitmq_container
    image: rabbitmq:3.12.10-management-alpine
    restart: always
    ports:
      # AMQP protocol port
      - '5672:5672'
      # Management UI
      - '15672:15672'
